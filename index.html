<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Bear Dojo — Карате Кіокушинкай Київ</title>
    
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Black Bear Dojo" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Black Bear Admin" />
    
    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var suppressLeadUntil = 0;

        document.addEventListener('click', function (event) {
          var target = event.target;
          if (target && target.closest && target.closest('#cta-button-hero')) {
            suppressLeadUntil = Date.now() + 1500;
          }
        }, true);

        function wrapFbq() {
          if (!window.fbq || window.fbq.__bbLeadGuard) return;

          var originalFbq = window.fbq;
          var guardedFbq = function () {
            var args = Array.prototype.slice.call(arguments);
            if (args[0] === 'track' && args[1] === 'Lead' && Date.now() < suppressLeadUntil) {
              return originalFbq('trackCustom', 'LeadIntent', {
                content_name: 'Hero CTA',
                location: 'hero'
              });
            }
            return originalFbq.apply(this, args);
          };

          for (var key in originalFbq) {
            try { guardedFbq[key] = originalFbq[key]; } catch (e) {}
          }
          guardedFbq.__bbLeadGuard = true;
          window.fbq = guardedFbq;
        }

        window.setInterval(wrapFbq, 250);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
