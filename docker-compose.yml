version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/blackbeardojo
      - SESSION_SECRET=local_secret_key_change_in_production
      - ADMIN_LOGIN=ihorkot12
      - ADMIN_PASSWORD=4756500ihor
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=blackbeardojo
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
